mode: yolo
adapter: cli
approval_mode: review

llm:
  model: anthropic/claude-sonnet-4-20250514
  api_key: ${ANTHROPIC_API_KEY}  # Optional for local models; can also be set directly.
  max_tokens: 4096
  temperature: 0.2
  timeout_seconds: 60
  max_retries: 2
  structured_output: native  # native | prompt
  native_tool_choice: required  # forced_function | required | auto | none
  native_fallback_to_prompt: true
  native_probe: true  # Probe native tool-call compatibility once per session.
  provider_settings: {}  # e.g. {"api_base": "http://127.0.0.1:1234/v1"}

context:
  token_budget: 4000
  summary_threshold: 10
  max_output_chars: 8000

loop:
  max_iterations: 50

skills:
  directory: ./skills

firecracker:
  binary: /usr/local/bin/firecracker
  kernel: ./firecracker/kernel/vmlinux
  rootfs: ./firecracker/rootfs/agent.ext4
  vcpu: 1
  mem_mb: 512
  host_iface: null
  boot_timeout: 30
  tap_subnet_base: "172.16.0.0"

telegram:
  token: ""
  local_mode: true               # false in non-local deployments (requires allowed_chat_ids)
  allowed_chat_ids: []           # required when local_mode=false
  max_active_sessions: 8
  max_output_total_bytes: 52428800
  max_output_file_bytes: 10485760
