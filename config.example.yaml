mode: fire                        # yolo | fire
adapters:
  enabled: [cli]                 # e.g. [cli], [telegram], or [cli, telegram]
approval_mode: review            # auto | review

llm:
  # Model identifier in {provider}/{model_name} format.
  # Examples:
  # - anthropic/claude-sonnet-4-20250514
  # - openai/gpt-4.1-mini
  # - lm_studio/qwen2.5-coder-7b-instruct
  # - ollama/qwen2.5:7b
  model: anthropic/claude-sonnet-4-20250514

  # Hosted providers: usually set via env var interpolation.
  # Local providers: often empty string is acceptable.
  api_key: ${ANTHROPIC_API_KEY}

  # Optional explicit base URL for local/custom endpoints.
  # Example local OpenAI-compatible server: http://localhost:1234/v1
  api_base: null

  max_tokens: 4096
  temperature: 0.2
  timeout_seconds: 60
  max_retries: 2

  # structured_output: native | prompt
  # - native: use provider tool/function-calling when supported.
  # - prompt: force schema-in-prompt parsing fallback.
  structured_output: native
  native_tool_choice: required   # forced_function | required | auto | none
  native_fallback_to_prompt: true
  native_probe: true             # probe native compatibility once per session

  # Additional LiteLLM kwargs. Usually empty.
  # Example:
  # provider_settings:
  #   api_base: http://127.0.0.1:1234/v1
  provider_settings: {}

tools:
  shell: true                   # High risk: command execution
  web_search: true              # Low risk: search endpoint queries
  web_fetch: true               # Low risk: URL retrieval/extraction
  http_request: true            # Medium risk: arbitrary HTTP API calls

web_search:
  # Quick-start: Brave API endpoint (requires api_key).
  # Self-hosted recommendation: set endpoint to SearXNG and format to "searxng".
  endpoint: "https://api.search.brave.com/res/v1/web/search"
  format: "brave"               # brave | searxng
  api_key: ""                   # required for brave; not needed for searxng
  max_results: 10

web_fetch:
  max_chars: 20000              # truncate extracted text (~5k tokens)

integrations:
  # Convenience credential storage for API skills.
  # Tokens are resolved from environment variables by config loading.
  # Current limitation: in Fire mode these tokens are delivered to the VM as
  # part of agent config. The planned host-side request broker will keep them
  # host-only later. Add a new API by adding another integration name and a
  # matching skill that calls http_request with integration: "<name>".
  notion:
    token: ""                   # e.g. ${NOTION_API_TOKEN}
    auth:
      type: bearer              # bearer | header | basic | none
    default_headers:
      Notion-Version: "2026-03-11"
  github:
    token: ""                   # e.g. ${GITHUB_TOKEN}
    auth:
      type: bearer
    default_headers:
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
  # Example custom API key header integration:
  # jira:
  #   token: ${JIRA_API_TOKEN}
  #   auth:
  #     type: header
  #     header: X-API-Key
  #   default_headers:
  #     Accept: "application/json"

request_broker:
  enabled: true
  expose_integration_metadata: true
  # Runtime-populated from host secrets registry safe metadata.
  # Do not place raw tokens here.
  integration_metadata: []

context:
  token_budget: 4000
  summary_threshold: 10
  max_output_chars: 8000

loop:
  max_iterations: 50

session_journal:
  enabled: false               # write per-session events.jsonl when true
  max_bytes: 1048576           # hard cap per session journal file (bytes)

skills:
  # Optional section. If omitted, defaults to:
  # {directory: ./skills, max_file_chars: 20000}
  directory: ./skills
  max_file_chars: 20000         # read_file truncation limit (~5k tokens)

firecracker:
  binary: /usr/local/bin/firecracker
  kernel: ./firecracker/kernel/vmlinux
  rootfs: ./firecracker/rootfs/agent.ext4
  vcpu: 1
  mem_mb: 512
  host_iface: null               # auto-detect from default route when null
  boot_timeout: 30
  tap_subnet_base: "172.16.0.0"

  # Optional host port exposure for Fire mode local LLM use.
  # Disabled by default for stronger isolation.
  host_expose:
    enabled: false
    ports: []                    # e.g. [11434] (Ollama), [1235] (LM Studio proxy)

    # LM Studio note:
    # If LM Studio listens only on 127.0.0.1:1234, the Fire guest cannot
    # reach it directly. Run a proxy in a separate terminal, then expose
    # that proxy port:
    #   socat TCP-LISTEN:1235,bind=0.0.0.0,reuseaddr,fork TCP:127.0.0.1:1234
    # and set llm.api_base: http://localhost:1235/v1

  # Optional Firecracker runtime log export (host-side diagnostics artifact).
  # Writes a sanitized tail to:
  # ~/.strangeclaw/sessions/<session_id>/outputs/system/firecracker.log.tail.txt
  log_export:
    enabled: false
    max_bytes: 32768

  # Emit Fire lifecycle status messages into adapter output.
  # Applies to host-side status events such as sandbox start/teardown.
  lifecycle_status_messages: true

telegram:
  token: ""
  local_mode: true               # set false in non-local deployments
  allowed_chat_ids: []           # empty means any chat can use the bot
  # allowed_chat_ids:
  #   - 123456789
  #   - 987654321
  max_active_sessions: 8
  max_output_total_bytes: 52428800
  max_output_file_bytes: 10485760
