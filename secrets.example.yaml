# Copy to ~/.strangeclaw/secrets.yaml and run:
# chmod 600 ~/.strangeclaw/secrets.yaml
#
# Credentials are host-only. They are used by the request broker and are not
# exposed to the sandboxed agent runtime.

credentials:
  notion:
    # Auth injection mode:
    # bearer -> Authorization: Bearer <token>
    # header -> <header_name>: <token>
    auth_type: bearer
    token: ""  # paste Notion integration token here

    # Host allowlist. Supports glob patterns via fnmatch.
    allowed_hosts: ["api.notion.com"]

    # Allowed methods for this integration.
    allowed_methods: [GET, POST, PATCH]

    # Allowed URL path patterns (glob syntax).
    allowed_paths: ["/v1/*"]

    # Allowed URL schemes for this integration.
    # Default is ["https"] when omitted.
    # Add "http" only for tightly-scoped internal/test endpoints.
    allowed_schemes: [https]

    # Headers the model cannot set directly.
    protected_headers: [Authorization]

    # Headers always merged by broker before execution.
    default_headers:
      Notion-Version: "2022-06-28"

    # Response size cap in bytes.
    max_response_bytes: 524288

    # Optional in-memory token bucket rate limit.
    # rate_limit:
    #   requests: 3
    #   per_seconds: 1

  github:
    auth_type: header
    token: ""  # paste GitHub token here
    header_name: Authorization  # with this setting value is token only
    allowed_hosts: ["api.github.com"]
    allowed_methods: [GET, POST, PATCH]
    allowed_paths: ["/repos/*", "/user", "/user/repos"]
    allowed_schemes: [https]
    protected_headers: [Authorization]
    default_headers:
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    max_response_bytes: 1048576
    # rate_limit:
    #   requests: 30
    #   per_seconds: 60

  _web_search:
    # Built-in integration for the web_search tool.
    # Keep this name exactly "_web_search".
    auth_type: header
    # Required non-empty token string.
    # Brave: paste the real API token.
    # SearXNG (no auth): use a harmless placeholder such as:
    # "unused-local-searxng-token"
    token: ""
    header_name: X-Subscription-Token
    allowed_hosts: ["api.search.brave.com", "localhost", "127.0.0.1"]
    allowed_methods: [GET]
    allowed_paths: ["/*"]
    # Default is [https]. For local HTTP SearXNG, set [http].
    allowed_schemes: [https]
    max_response_bytes: 131072

    # Brave variant:
    # - config.web_search.endpoint: https://api.search.brave.com/res/v1/web/search
    # - config.web_search.format: brave
    # - token: real Brave API key
    #
    # SearXNG variant:
    # - config.web_search.endpoint: http://localhost:8080/search
    # - config.web_search.format: searxng
    # - token: "unused-local-searxng-token" (required placeholder)
